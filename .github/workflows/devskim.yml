name: DevSkim Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly security scan
    - cron: '33 8 * * 0'

jobs:
  devskim:
    name: DevSkim Security Analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@v1
        with:
          args: >
            --exclude node_modules/**
            --exclude .git/**
            --exclude .github/**
            --exclude .next/**
            --exclude dist/**
            --exclude build/**
            --exclude coverage/**
            --exclude out/**
            --exclude public/**
            --exclude logs/**
            --exclude tmp/**
            --exclude temp/**
            --exclude .cache/**
            --exclude .turbo/**
            --exclude .vercel/**
            --exclude vendor/**
            --exclude packages/**/dist/**
            --exclude packages/**/build/**
            --exclude **/*.min.js
            --exclude **/*.bundle.js
            --exclude **/*.map
            --exclude **/*.lock
            --exclude package-lock.json
            --exclude yarn.lock
            --exclude pnpm-lock.yaml

      - name: Upload DevSkim results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-results.sarif