name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main # Ensure this matches your production branch

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: kampyn-backend
  REGION: us-central1 # Update as needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}' # Set this secret in GitHub

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Google Container Registry
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build the Docker Image
        run: docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} .

      - name: Push the Docker Image to GCR
        run: docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          port: 3001
          # To map secrets like MongoDB URI, use the env_vars field:
          # env_vars: |
          #   NODE_ENV=production
          #   MONGODB_URI=${{ secrets.MONGO_URI }}
